name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 触发条件: 推送 v 开头的标签 (如 v1.0.0)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller build.spec

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Copy Chinese language file
      run: |
        Copy-Item -Path "ChineseSimplified.isl" -Destination "C:\Program Files (x86)\Inno Setup 6\Languages\" -Force
      shell: pwsh

    - name: Build installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Get version from tag
      id: get_version
      run: |
        $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: installer/NekroAgent-Setup.exe
        name: Nekro-Agent Windows Manager ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Nekro-Agent Windows 管理器 ${{ steps.get_version.outputs.VERSION }}

          ### 安装说明
          1. 下载 `NekroAgent-Setup.exe`
          2. 以管理员身份运行安装程序
          3. 按照向导完成安装

          ### 系统要求
          - Windows 10/11 (64位)
          - 需要启用 WSL2

          ### 更新日志
          请查看 commit 历史了解详细变更
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
